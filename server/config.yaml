server:
  host: "localhost"
  port: 8080
  read_timeout: 30s
  write_timeout: 30s

logging:
  level: "info"
  format: "json"

services:
  - name: user-service
    host: "localhost"
    port: 3001
    health_check: /health
    timeout: 10s

  - name: product-service
    host: localhost
    port: 3002
    health_check: /health
    timeout: 10s

routes:
  - path: /users
    service: user-service
    methods: [GET, POST, PUT, DELETE, PATCH]
    strip_prefix: false

  - path: /product
    service: product-service
    methods: [GET, POST, PUT, DELETE, PATCH]
    strip_prefix: false
